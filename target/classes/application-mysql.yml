server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gst_db
    username: gst_user
    password: mypassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    time-zone: UTC

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
